<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d7ac38" />
      <stop offset="100%" stop-color="#ed3334" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="48" height="48" rx="12" fill="url(#logo-gradient)" />
  
  <!-- Copy Icon -->
  <g transform="translate(12, 12)">
    <!-- Back rectangle -->
    <rect x="6" y="6" width="18" height="18" rx="2" stroke="white" stroke-width="2.5" fill="none" />
    <!-- Front rectangle -->
    <rect x="0" y="0" width="18" height="18" rx="2" stroke="white" stroke-width="2.5" fill="none" />
  </g>
</svg>
